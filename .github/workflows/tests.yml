name: UI Autotests
on:
  push:
    branches: [ MPGY ]
  pull_request:
    branches: [ MPGY ]
  workflow_dispatch:      # ОБЯЗАТЕЛЬНО: эта строка разрешает запуск через API и бота
    inputs:               # (Опционально) можно добавить параметры запуска
      logLevel:
        description: 'Log level'
        required: false
        default: 'warning'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps
      - name: Run tests
        run: pytest  # Или ваша команда запуска
      - name: Send Telegram Notification
        if: always()
        env:
          # Вот этот блок связывает "Секреты" с "Переменными окружения"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}&text=📊 Тесты завершены! Проверь отчет в GitHub Actions."