name: UI Autotests
on:
  push:
    branches: [ MPGY ]
  pull_request:
    branches: [ MPGY ]
  workflow_dispatch:      # ОБЯЗАТЕЛЬНО: эта строка разрешает запуск через API и бота
    inputs:
      test_file:
        description: 'Forms/dszn136200.py'
        required: true
        default: 'test1/' # Папка по умолчанию, если ничего не введено

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
      - name: Check connectivity
        run: curl -I https://dszn136200.fogu.srvdev.ru/pgu2/136200  
      - name: Run tests
        if: always()
        # Добавляем генерацию данных для Allure
        run: xvfb-run pytest ${{ github.event.inputs.test_file }} --alluredir=allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y allure
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Этот секрет есть у GitHub по умолчанию
          publish_dir: ./allure-report

      - name: Send Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Ссылка на ваш отчет (замените arterm333 на ваш ник)
          REPORT_URL="https://arterm333.github.io/MPGY/"
          
          curl -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d "chat_id=${CHAT_ID}&parse_mode=HTML&text=📊 <b>Тест завершен!</b>%0A%0A🌐 <a href='$REPORT_URL'>Открыть Allure отчет</a>"