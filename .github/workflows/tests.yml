name: UI Autotests
on:
  push:
    branches: [ MPGY ]
  pull_request:
    branches: [ MPGY ]
  workflow_dispatch:      # ОБЯЗАТЕЛЬНО: эта строка разрешает запуск через API и бота
    inputs:
      test_file:
        description: 'Forms/dszn136200.py'
        required: true
        default: 'test1/' # Папка по умолчанию, если ничего не введено

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
      - name: Run tests
        run: xvfb-run pytest ${{ github.event.inputs.test_file }}  # Или ваша команда запуска
     - name: Generate Allure Report
        if: always()
        run: |
          sudo apt-get install -y allure
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Ссылка на ваш GitHub Pages (замените arterm333 на ваш логин)
          REPORT_URL="https://arterm333.github.io/MPGY/"
          
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=HTML&text=✅ <b>Allure-отчет готов!</b>%0A%0A🌐 <a href='$REPORT_URL'>Открыть отчет в браузере</a>"