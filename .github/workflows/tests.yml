name: UI Autotests
on:
  push:
    branches: [ MPGY ]
  pull_request:
    branches: [ MPGY ]
  workflow_dispatch:      # ОБЯЗАТЕЛЬНО: эта строка разрешает запуск через API и бота
    inputs:
      test_file:
        description: 'Forms/dszn136200.py'
        required: true
        default: 'test1/' # Папка по умолчанию, если ничего не введено

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
      - name: Run tests
        run: xvfb-run pytest ${{ github.event.inputs.test_file }}  # Или ваша команда запуска
      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Формируем ссылку на конкретный запуск теста
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=HTML&text=📊 <b>Тест завершен!</b>%0A%0AПуть: <code>${{ github.event.inputs.test_file }}</code>%0A📎 <a href='$RUN_URL'>Посмотреть отчет в GitHub Actions</a>"